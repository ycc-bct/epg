<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠雄人壽 AI 保險助理</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ══════════════════════════════════
           THEME VARIABLES
        ══════════════════════════════════ */
        :root {
            /* Brand */
            --red: #E7242C;
            --red-dark: #C41E24;
            --red-light: #FFF0F0;

            /* Chat (unchanged in both themes) */
            --white: #FFFFFF;
            --gray-50: #F8FAFC;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-300: #CBD5E1;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1E293B;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.12);

            /* ── DARK MODE (default) ── */
            --land-bg:              #06090F;
            --land-text:            #F1F5F9;
            --land-text-dim:        rgba(255,255,255,0.42);
            --land-text-faint:      rgba(255,255,255,0.2);
            --land-card-bg:         rgba(255,255,255,0.05);
            --land-card-border:     rgba(255,255,255,0.08);
            --land-card-hover-border-1: rgba(231,36,44,0.5);
            --land-card-hover-border-2: rgba(96,165,250,0.5);
            --land-card-title:      #FFFFFF;
            --land-card-desc:       rgba(255,255,255,0.52);
            --land-card-cta:        rgba(255,255,255,0.3);
            --land-company:         #FFFFFF;
            --land-subtitle:        rgba(255,255,255,0.38);
            --land-tagline:         rgba(255,255,255,0.38);
            --land-toggle-bg:       rgba(255,255,255,0.08);
            --land-toggle-border:   rgba(255,255,255,0.12);
            --land-toggle-color:    rgba(255,255,255,0.75);
            --land-footer:          rgba(255,255,255,0.2);

            /* Orb colors */
            --orb1: rgba(231, 36, 44, 0.22);
            --orb2: rgba(88, 50, 240, 0.14);
            --orb3: rgba(251, 113, 33, 0.09);
        }

        [data-theme="light"] {
            --land-bg:              #F8F9FF;
            --land-text:            #0F172A;
            --land-text-dim:        rgba(15,23,42,0.55);
            --land-text-faint:      rgba(15,23,42,0.35);
            --land-card-bg:         rgba(255,255,255,0.88);
            --land-card-border:     rgba(0,0,0,0.07);
            --land-card-hover-border-1: rgba(231,36,44,0.4);
            --land-card-hover-border-2: rgba(59,130,246,0.4);
            --land-card-title:      #0F172A;
            --land-card-desc:       #475569;
            --land-card-cta:        #94A3B8;
            --land-company:         #0F172A;
            --land-subtitle:        rgba(15,23,42,0.42);
            --land-tagline:         rgba(15,23,42,0.42);
            --land-toggle-bg:       rgba(0,0,0,0.05);
            --land-toggle-border:   rgba(0,0,0,0.1);
            --land-toggle-color:    rgba(15,23,42,0.65);
            --land-footer:          rgba(15,23,42,0.32);

            /* Orbs: warm golden sunlight + sky blue */
            --orb1: rgba(251, 191, 36, 0.28);
            --orb2: rgba(125, 211, 252, 0.22);
            --orb3: rgba(231, 36, 44, 0.06);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            position: fixed; inset: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1);
        }
        .screen.active { opacity: 1; pointer-events: all; }

        /* ══════════════════════════════════
           LANDING
        ══════════════════════════════════ */
        #screen-landing {
            background: var(--land-bg);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-y: auto;
            transition: background 0.6s ease;
        }

        /* ── Light-source background ── */
        .land-bg {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }

        /* Orbs = blurred light sources */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            will-change: transform;
        }
        /* Dark: red primary (top-right) + violet accent (bottom-left) + amber warmth (center) */
        .orb-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, var(--orb1) 0%, transparent 68%);
            top: -200px; right: -180px;
        }
        .orb-2 {
            width: 560px; height: 560px;
            background: radial-gradient(circle, var(--orb2) 0%, transparent 68%);
            bottom: -160px; left: -160px;
        }
        .orb-3 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, var(--orb3) 0%, transparent 68%);
            top: 38%; left: 38%;
        }

        /* Grid overlay */
        .land-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        [data-theme="light"] .land-grid {
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        }

        /* ── Theme toggle ── */
        .theme-toggle {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            z-index: 10;
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--land-toggle-bg);
            border: 1px solid var(--land-toggle-border);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--land-toggle-color);
            transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.2s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .theme-toggle:hover { transform: scale(1.08); background: var(--land-card-bg); }
        .theme-toggle svg { width: 18px; height: 18px; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
        .theme-toggle:hover svg { transform: rotate(20deg); }
        .icon-sun, .icon-moon { position: absolute; transition: opacity 0.3s, transform 0.3s; }
        .icon-moon { opacity: 0; transform: rotate(20deg) scale(0.8); }
        [data-theme="light"] .icon-sun  { opacity: 0; transform: rotate(-20deg) scale(0.8); }
        [data-theme="light"] .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }

        /* ── Landing content ── */
        .landing-content {
            position: relative; z-index: 1;
            width: 100%; max-width: 820px;
            padding: 4rem 2rem;
            display: flex; flex-direction: column;
            align-items: center; gap: 3.5rem;
            min-height: 100vh; justify-content: center;
        }

        /* ── Brand / logo ── */
        .landing-brand {
            display: flex; flex-direction: column;
            align-items: center; gap: 1rem;
            animation: fadeSlideDown 0.9s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes fadeSlideDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }

        .brand-logo-row {
            display: flex; align-items: center; gap: 1.1rem;
        }
        .brand-svg { width: 54px; height: 44px; flex-shrink: 0; }
        .brand-text { display: flex; flex-direction: column; }
        .brand-company {
            font-size: 1.5rem; font-weight: 700;
            color: var(--land-company);
            letter-spacing: 0.04em;
            transition: color 0.5s;
        }
        .brand-subtitle {
            font-size: 0.72rem; letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--land-subtitle);
            margin-top: 3px;
            transition: color 0.5s;
        }
        .brand-tagline {
            font-size: 0.875rem;
            color: var(--land-tagline);
            transition: color 0.5s;
        }

        /* ── Cards ── */
        .cards-title {
            font-size: 1.175rem; font-weight: 500;
            color: var(--land-text);
            text-align: center;
            transition: color 0.5s;
            animation: fadeSlideUp 0.8s 0.2s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes fadeSlideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

        .mode-cards {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 1.25rem; width: 100%; max-width: 660px;
        }
        .mode-card {
            background: var(--land-card-bg);
            border: 1px solid var(--land-card-border);
            border-radius: 20px;
            padding: 2rem 1.75rem;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1),
                        border-color 0.3s, box-shadow 0.3s,
                        background 0.5s;
            display: flex; flex-direction: column; gap: 0.875rem;
            position: relative; overflow: hidden;
            animation: cardIn 0.75s cubic-bezier(0.4,0,0.2,1) both;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        /* Cursor spotlight on cards */
        .mode-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 20px;
            background: radial-gradient(380px circle at var(--cx, 50%) var(--cy, 50%),
                rgba(255,255,255,0.11) 0%, transparent 65%);
            opacity: 0; transition: opacity 0.45s; pointer-events: none; z-index: 0;
        }
        [data-theme="light"] .mode-card::before {
            background: radial-gradient(380px circle at var(--cx, 50%) var(--cy, 50%),
                rgba(231,36,44,0.07) 0%, transparent 65%);
        }
        .mode-card:hover::before { opacity: 1; }

        .mode-card::after {
            content: ''; position: absolute; inset: 0;
            opacity: 0; transition: opacity 0.3s; border-radius: 20px;
        }
        .mode-card:nth-child(1)::after { background: linear-gradient(135deg, rgba(231,36,44,0.1), transparent 65%); }
        .mode-card:nth-child(2)::after { background: linear-gradient(135deg, rgba(96,165,250,0.1), transparent 65%); }
        .mode-card:hover::after { opacity: 1; }
        .mode-card:nth-child(1) { animation-delay: 0.3s; }
        .mode-card:nth-child(2) { animation-delay: 0.45s; }
        @keyframes cardIn { from{opacity:0;transform:translateY(26px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
        .mode-card:hover { transform: translateY(-5px); }
        .mode-card:nth-child(1):hover { border-color: var(--land-card-hover-border-1); box-shadow: 0 20px 48px rgba(0,0,0,0.25), 0 0 0 1px var(--land-card-hover-border-1); }
        .mode-card:nth-child(2):hover { border-color: var(--land-card-hover-border-2); box-shadow: 0 20px 48px rgba(0,0,0,0.25), 0 0 0 1px var(--land-card-hover-border-2); }
        .mode-card:active { transform: translateY(-2px) scale(0.99); }

        .card-icon {
            width: 48px; height: 48px; border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
        }
        .mode-card:nth-child(1) .card-icon { background: rgba(231,36,44,0.15); }
        .mode-card:nth-child(2) .card-icon { background: rgba(96,165,250,0.15); }
        .card-icon svg { width: 24px; height: 24px; }
        .mode-card:nth-child(1) .card-icon svg { color: #FF7070; }
        .mode-card:nth-child(2) .card-icon svg { color: #60A5FA; }
        .card-title { font-size: 1.075rem; font-weight: 600; color: var(--land-card-title); position: relative; z-index: 1; transition: color 0.5s; }
        .card-desc  { font-size: 0.845rem; color: var(--land-card-desc); line-height: 1.68; position: relative; z-index: 1; transition: color 0.5s; }
        .card-cta {
            display: flex; align-items: center; gap: 0.45rem;
            font-size: 0.78rem; color: var(--land-card-cta);
            margin-top: 0.25rem; transition: all 0.2s;
            position: relative; z-index: 1;
        }
        .card-cta svg { width: 14px; height: 14px; transition: transform 0.2s; }
        .mode-card:nth-child(1):hover .card-cta { color: #FF7070; gap: 0.7rem; }
        .mode-card:nth-child(2):hover .card-cta { color: #60A5FA; gap: 0.7rem; }
        .mode-card:hover .card-cta svg { transform: translateX(4px); }

        .landing-footer {
            font-size: 0.7rem; color: var(--land-footer);
            text-align: center; line-height: 1.75;
            transition: color 0.5s;
            animation: fadeSlideUp 0.8s 0.6s cubic-bezier(0.4,0,0.2,1) both;
        }

        /* ══════════════════════════════════
           CHAT HEADER
        ══════════════════════════════════ */
        #screen-chat { background: var(--gray-50); display: flex; flex-direction: column; }

        .chat-header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            height: 60px; padding: 0 1.25rem;
            display: flex; align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0; z-index: 10;
        }
        .h-left {
            display: flex; align-items: center;
            gap: 0.7rem; flex-shrink: 0;
        }
        .back-btn {
            width: 33px; height: 33px;
            border: 1.5px solid var(--gray-200); border-radius: 9px;
            background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-500); transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
        .back-btn svg { width: 15px; height: 15px; }
        .h-logo { width: 28px; height: 23px; }
        .h-company { font-size: 0.875rem; font-weight: 600; color: var(--gray-800); }
        .h-sep { width: 1px; height: 14px; background: var(--gray-200); }

        /* Mode tabs — RIGHT side of header */
        .h-right {
            display: flex; align-items: center;
        }
        .mode-tabs {
            display: flex;
            background: var(--gray-100);
            border-radius: 10px; padding: 3px; gap: 2px;
        }
        .mode-tab {
            padding: 0.35rem 0.9rem;
            border: none; border-radius: 7px;
            font-size: 0.8rem; font-weight: 500;
            cursor: pointer; color: var(--gray-500);
            background: transparent; white-space: nowrap;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .mode-tab.active { background: var(--white); color: var(--red); box-shadow: var(--shadow-sm); font-weight: 600; }
        .mode-tab:not(.active):hover { color: var(--gray-700); background: rgba(255,255,255,0.6); }

        /* File bar */
        .file-bar {
            display: none; align-items: center; justify-content: space-between;
            padding: 0.5rem 1.25rem;
            background: linear-gradient(135deg, #FFF5F5, #FFF0F0);
            border-bottom: 1px solid #FECACA; flex-shrink: 0;
        }
        .file-bar.on { display: flex; }
        .file-bar-left { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--red-dark); font-weight: 500; }
        .file-bar-left svg { width: 15px; height: 15px; }
        .change-btn {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.28rem 0.7rem; background: var(--white);
            border: 1px solid #FECACA; border-radius: 6px;
            font-size: 0.75rem; color: var(--red-dark);
            cursor: pointer; transition: all 0.2s;
        }
        .change-btn:hover { background: var(--red); color: var(--white); border-color: var(--red); }
        .change-btn svg { width: 12px; height: 12px; }

        /* Messages */
        .chat-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .messages {
            flex: 1; overflow-y: auto; padding: 1.25rem;
            display: flex; flex-direction: column; gap: 0.875rem;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

        /* Welcome */
        .welcome-wrap {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; padding: 2.5rem 1.5rem; text-align: center;
        }
        .welcome-ring {
            position: relative; width: 76px; height: 76px;
            margin: 0 auto 1.5rem;
        }
        .welcome-ring::before, .welcome-ring::after {
            content: ''; position: absolute; border-radius: 50%;
            border: 1.5px solid rgba(231,36,44,0.15);
            animation: wPulse 3s ease-in-out infinite;
        }
        .welcome-ring::before { inset: -10px; }
        .welcome-ring::after  { inset: -20px; animation-delay: 0.6s; }
        @keyframes wPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:0.55} }
        .welcome-icon {
            width: 76px; height: 76px;
            background: linear-gradient(135deg, var(--red-light), #FFE4E4);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
        }
        .welcome-icon svg { width: 36px; height: 36px; color: var(--red); }
        .welcome-title { font-size: 1.175rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.4rem; }
        .welcome-desc  { font-size: 0.875rem; color: var(--gray-500); line-height: 1.7; max-width: 340px; }
        .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 1.25rem; max-width: 480px; }
        .chip {
            padding: 0.38rem 0.85rem;
            background: var(--white); border: 1.5px solid var(--gray-200);
            border-radius: 9999px; font-size: 0.78rem; color: var(--gray-600);
            cursor: pointer; transition: all 0.2s;
        }
        .chip:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

        /* Message bubbles */
        .msg {
            display: flex; gap: 0.625rem; max-width: 80%;
            animation: msgIn 0.3s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-av {
            width: 32px; height: 32px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
        }
        .msg.assistant .msg-av { background: var(--white); border: 1px solid var(--gray-100); }
        .msg.user       .msg-av { background: var(--gray-200); color: var(--gray-600); }
        .msg-body { display: flex; flex-direction: column; gap: 0.2rem; }
        .msg-text { padding: 0.8rem 1rem; border-radius: 13px; line-height: 1.65; font-size: 0.875rem; }
        .msg.assistant .msg-text { background: var(--white); color: var(--gray-800); border-bottom-left-radius: 3px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); }
        .msg.user       .msg-text { background: linear-gradient(135deg, var(--red), var(--red-dark)); color: var(--white); border-bottom-right-radius: 3px; }
        .msg-time { font-size: 0.67rem; color: var(--gray-400); padding: 0 0.2rem; }
        .msg.user .msg-time { text-align: right; }

        /* Typing indicator */
        .typing-row { display: flex; gap: 0.625rem; align-items: flex-end; }
        .typing-av {
            width: 32px; height: 32px; border-radius: 9px;
            background: var(--white); border: 1px solid var(--gray-100);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .typing-bubble {
            background: var(--white); border: 1px solid var(--gray-100);
            border-radius: 13px; border-bottom-left-radius: 3px;
            padding: 0.875rem 1rem; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 5px;
        }
        .td { width: 7px; height: 7px; border-radius: 50%; background: var(--red); opacity: 0.6; animation: wave 1.4s ease-in-out infinite; }
        .td:nth-child(2) { animation-delay: 0.2s; }
        .td:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%,60%,100%{transform:translateY(0);opacity:0.6} 30%{transform:translateY(-7px);opacity:1} }

        /* Input */
        .input-area { padding: 0.875rem 1.25rem; background: var(--white); border-top: 1px solid var(--gray-100); flex-shrink: 0; }
        .input-wrap {
            display: flex; gap: 0.625rem; align-items: flex-end;
            background: var(--gray-50); border: 2px solid var(--gray-200);
            border-radius: 15px; padding: 0.5rem 0.5rem 0.5rem 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrap:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(231,36,44,0.07); background: var(--white); }
        .input-field {
            flex: 1; border: none; background: transparent;
            font-size: 0.875rem; color: var(--gray-800);
            resize: none; min-height: 24px; max-height: 120px;
            font-family: inherit; line-height: 1.5; outline: none;
        }
        .input-field::placeholder { color: var(--gray-400); }
        .send-btn {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            border: none; border-radius: 9px; color: var(--white);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 12px rgba(231,36,44,0.4); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .send-btn svg { width: 17px; height: 17px; }

        /* ══════════════════════════════════
           LOADING OVERLAY
        ══════════════════════════════════ */
        .ov {
            position: fixed; inset: 0;
            background: rgba(6,9,15,0.8);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .ov.on { opacity: 1; pointer-events: all; }
        .ov-card {
            background: var(--white); border-radius: 22px;
            padding: 2.5rem; max-width: 290px; width: 90%;
            display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .doc-wrap { position: relative; width: 68px; height: 82px; }
        .doc-ring { position: absolute; inset: -12px; border-radius: 15px; border: 1.5px solid rgba(231,36,44,0.2); animation: dRing 2s ease-in-out infinite; }
        @keyframes dRing { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
        .doc-body { position: absolute; inset: 0; background: var(--gray-50); border: 2px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
        .doc-fold { position: absolute; top: 0; right: 0; width: 16px; height: 16px; background: var(--gray-200); clip-path: polygon(100% 0, 0 0, 100% 100%); }
        .doc-lns { position: absolute; top: 22px; left: 9px; right: 9px; display: flex; flex-direction: column; gap: 6px; }
        .doc-ln { height: 4px; background: var(--gray-200); border-radius: 2px; }
        .doc-ln:last-child { width: 55%; }
        .scan-glow { position: absolute; left: 0; right: 0; height: 16px; background: linear-gradient(to bottom, transparent, rgba(231,36,44,0.07), transparent); animation: scanMove 2s ease-in-out infinite; top: 6%; }
        .scan-beam { position: absolute; left: 0; right: 0; height: 1.5px; background: linear-gradient(90deg, transparent 5%, var(--red) 40%, var(--red) 60%, transparent 95%); box-shadow: 0 0 6px var(--red), 0 0 12px rgba(231,36,44,0.2); animation: scanMove 2s ease-in-out infinite; top: 8%; }
        @keyframes scanMove { 0%{top:8%} 50%{top:80%} 100%{top:8%} }
        .ov-title { font-size: 0.975rem; font-weight: 600; color: var(--gray-800); text-align: center; }
        .ov-sub { font-size: 0.78rem; color: var(--gray-400); text-align: center; margin-top: -0.625rem; }
        .ov-bar { width: 100%; height: 3px; background: var(--gray-100); border-radius: 9999px; overflow: hidden; }
        .ov-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--red-dark)); border-radius: 9999px; animation: barFill 2.5s ease-in-out infinite; }
        @keyframes barFill { 0%{width:0%} 65%{width:80%} 100%{width:100%} }

        /* ══════════════════════════════════
           MODAL
        ══════════════════════════════════ */
        .modal-ov {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .modal-ov.on { opacity: 1; pointer-events: all; }
        .modal-card {
            background: var(--white); border-radius: 20px;
            padding: 2rem; max-width: 340px; width: 90%;
            box-shadow: var(--shadow-xl);
            transform: translateY(12px) scale(0.97);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-ov.on .modal-card { transform: translateY(0) scale(1); }
        .modal-ico { width: 48px; height: 48px; border-radius: 13px; background: #FFF7ED; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .modal-ico svg { width: 24px; height: 24px; color: #F59E0B; }
        .modal-title { font-size: 1.05rem; font-weight: 700; color: var(--gray-800); margin-bottom: 0.4rem; }
        .modal-desc { font-size: 0.845rem; color: var(--gray-500); line-height: 1.65; margin-bottom: 1.25rem; }
        .modal-btns { display: flex; gap: 0.625rem; }
        .btn-cancel { flex: 1; padding: 0.65rem; border: 1.5px solid var(--gray-200); border-radius: 9px; background: transparent; font-size: 0.845rem; color: var(--gray-600); cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn-cancel:hover { border-color: var(--gray-300); background: var(--gray-50); }
        .btn-confirm { flex: 1; padding: 0.65rem; border: none; border-radius: 9px; background: linear-gradient(135deg, var(--red), var(--red-dark)); font-size: 0.845rem; color: var(--white); cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-confirm:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(231,36,44,0.35); }

        /* ══════════════════════════════════
           CHAT DARK MODE
        ══════════════════════════════════ */
        [data-theme="dark"] #screen-chat              { background: #0B1120; }
        [data-theme="dark"] .chat-header              { background: #0D1526; border-color: rgba(255,255,255,0.06); box-shadow: none; }
        [data-theme="dark"] .h-company                { color: #CBD5E1; }
        [data-theme="dark"] .h-sep                    { background: rgba(255,255,255,0.08); }
        [data-theme="dark"] .back-btn                 { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); }
        [data-theme="dark"] .back-btn:hover           { border-color: var(--red); color: var(--red); background: rgba(231,36,44,0.1); }
        [data-theme="dark"] .mode-tabs                { background: rgba(255,255,255,0.06); }
        [data-theme="dark"] .mode-tab                 { color: rgba(255,255,255,0.35); }
        [data-theme="dark"] .mode-tab.active          { background: rgba(255,255,255,0.1); color: #fff; box-shadow: none; }
        [data-theme="dark"] .mode-tab:not(.active):hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
        [data-theme="dark"] .h-theme-btn              { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
        [data-theme="dark"] .h-theme-btn:hover        { background: rgba(255,255,255,0.1); }
        [data-theme="dark"] .file-bar                 { background: rgba(231,36,44,0.07); border-color: rgba(231,36,44,0.15); }
        [data-theme="dark"] .file-bar-left            { color: #FCA5A5; }
        [data-theme="dark"] .change-btn               { background: rgba(255,255,255,0.05); border-color: rgba(231,36,44,0.2); color: #FCA5A5; }
        [data-theme="dark"] .chat-main,
        [data-theme="dark"] .messages                 { background: #0B1120; }
        [data-theme="dark"] .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
        [data-theme="dark"] .msg.assistant .msg-text  { background: #141E30; border-color: rgba(255,255,255,0.06); color: #D1D5DB; }
        [data-theme="dark"] .msg.assistant .msg-av     { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .typing-av                { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .msg.user .msg-av         { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.55); }
        [data-theme="dark"] .msg-time                 { color: rgba(255,255,255,0.2); }
        [data-theme="dark"] .typing-bubble            { background: #141E30; border-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .input-area               { background: #0D1526; border-color: rgba(255,255,255,0.05); }
        [data-theme="dark"] .input-wrap               { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .input-wrap:focus-within  { border-color: var(--red); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(231,36,44,0.1); }
        [data-theme="dark"] .input-field              { color: #E2E8F0; }
        [data-theme="dark"] .input-field::placeholder { color: rgba(255,255,255,0.22); }
        [data-theme="dark"] .welcome-icon             { background: rgba(231,36,44,0.1); }
        [data-theme="dark"] .welcome-ring::before,
        [data-theme="dark"] .welcome-ring::after      { border-color: rgba(231,36,44,0.1); }
        [data-theme="dark"] .welcome-title            { color: #E2E8F0; }
        [data-theme="dark"] .welcome-desc             { color: rgba(255,255,255,0.4); }
        [data-theme="dark"] .chip                     { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.48); }
        [data-theme="dark"] .chip:hover               { border-color: var(--red); color: var(--red); background: rgba(231,36,44,0.08); }

        /* ══════════════════════════════════
           ANALYSIS + PDF TAG
        ══════════════════════════════════ */

        /* Header theme button */
        .h-theme-btn {
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--gray-100); border: 1px solid var(--gray-200);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--gray-500); margin-left: 0.5rem;
            transition: all 0.2s; position: relative; flex-shrink: 0;
        }
        .h-theme-btn:hover { background: var(--gray-200); }
        .h-theme-btn svg { width: 14px; height: 14px; }
        .h-theme-btn .icon-sun, .h-theme-btn .icon-moon { position: absolute; transition: opacity 0.25s; }
        .h-theme-btn .icon-moon { opacity: 0; }
        [data-theme="light"] .h-theme-btn .icon-sun  { opacity: 0; }
        [data-theme="light"] .h-theme-btn .icon-moon { opacity: 1; }

        /* AI avatar with logo */
        .msg.assistant .msg-av { padding: 5px; }
        .msg.assistant .msg-av svg { width: 100%; height: 100%; }
        .typing-av { padding: 5px; }
        .typing-av svg { width: 100%; height: 100%; }

        /* PDF tag in message */
        .pdf-tag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.2rem 0.55rem;
            background: var(--gray-100); border: 1px solid var(--gray-200);
            border-radius: 5px; font-size: 0.7rem; color: var(--gray-500);
            margin-bottom: 0.6rem; max-width: 100%;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .pdf-tag svg { width: 11px; height: 11px; flex-shrink: 0; color: var(--gray-400); }
        [data-theme="dark"] .pdf-tag { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); }
        [data-theme="dark"] .pdf-tag svg { color: rgba(255,255,255,0.28); }

        /* Analysis collapsible */
        .analysis-wrap { margin-bottom: 0.55rem; }
        .analysis-toggle {
            display: inline-flex; align-items: center; gap: 0.28rem;
            background: none; border: none; cursor: pointer; padding: 0;
            font-size: 0.7rem; font-family: inherit;
            color: var(--gray-400); transition: color 0.2s; user-select: none;
        }
        .analysis-toggle:hover { color: var(--gray-600); }
        .analysis-toggle .chev { width: 10px; height: 10px; transition: transform 0.2s; flex-shrink: 0; }
        .analysis-toggle.open .chev { transform: rotate(90deg); }
        .analysis-steps {
            display: none; margin-top: 0.3rem;
            padding: 0.35rem 0 0.2rem 0.7rem;
            border-left: 1.5px solid var(--gray-200);
        }
        .analysis-steps.open { display: block; }
        .analysis-step { font-size: 0.7rem; color: var(--gray-400); line-height: 1.65; padding: 0.06rem 0; }
        .analysis-divider { border: none; border-top: 1px solid var(--gray-100); margin: 0.65rem 0; }
        [data-theme="dark"] .analysis-toggle          { color: rgba(255,255,255,0.25); }
        [data-theme="dark"] .analysis-toggle:hover    { color: rgba(255,255,255,0.45); }
        [data-theme="dark"] .analysis-steps           { border-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .analysis-step            { color: rgba(255,255,255,0.27); }
        [data-theme="dark"] .analysis-divider         { border-color: rgba(255,255,255,0.07); }

        /* Batch in-progress spinner inside bubble */
        .batch-prog { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.15rem; }
        .batch-prog-dots { display: flex; gap: 3px; align-items: center; }
        .batch-prog-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gray-400); animation: bsDot 1.4s ease-in-out infinite; }
        .batch-prog-dot:nth-child(2) { animation-delay: 0.2s; }
        .batch-prog-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bsDot { 0%,60%,100%{transform:scale(0.65);opacity:0.4} 30%{transform:scale(1);opacity:1} }
        .batch-prog-text { font-size: 0.75rem; color: var(--gray-400); }
        [data-theme="dark"] .batch-prog-dot  { background: rgba(255,255,255,0.3); }
        [data-theme="dark"] .batch-prog-text { color: rgba(255,255,255,0.3); }

        /* ══════════════════════════════════
           RESPONSIVE
        ══════════════════════════════════ */
        @media (max-width: 600px) {
            .mode-cards { grid-template-columns: 1fr; max-width: 360px; }
            .mode-card { padding: 1.5rem 1.25rem; }
            .chat-header { padding: 0 0.875rem; }
            .h-company, .h-sep { display: none; }
            .mode-tab { font-size: 0.75rem; padding: 0.32rem 0.65rem; }
            .messages { padding: 1rem; }
            .input-area { padding: 0.75rem; }
            .msg { max-width: 88%; }
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LANDING
══════════════════════════════════════════ -->
<div id="screen-landing" class="screen active">

    <!-- Light-source background -->
    <div class="land-bg">
        <div class="orb orb-1" id="orb1"></div>
        <div class="orb orb-2" id="orb2"></div>
        <div class="orb orb-3" id="orb3"></div>
        <div class="land-grid"></div>
    </div>

    <!-- Theme toggle (top-right) -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切換主題">
        <!-- Sun icon (dark mode shows this = click to go light) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707.707M6.343 6.343l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
        </svg>
        <!-- Moon icon (light mode shows this = click to go dark) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
    </button>

    <div class="landing-content">
        <!-- Brand -->
        <div class="landing-brand">
            <div class="brand-logo-row">
                <svg class="brand-svg" viewBox="0 0 144 118" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M133.494 91.4018C138.591 84.9436 143.944 74.8739 143.982 66.82C128.359 66.973 112.735 67.0103 97.1122 66.9315L85.5354 66.9192C82.0714 66.9063 78.4166 66.6879 75.0017 67.3524C72.7199 67.7964 70.6601 68.9955 69.0515 70.664C63.5669 76.3526 55.1847 93.8431 49.4468 97.0127C46.9472 98.3935 43.7445 98.4913 40.9583 98.5569C37.7887 98.6316 34.6103 98.5961 31.4397 98.5782C34.1483 93.3528 36.5444 90.2013 39.8389 85.3386L48.3318 72.6197C54.3946 63.6795 57.5067 55.8325 68.5342 52.3289C68.9619 52.1938 69.3928 52.068 69.8262 51.9518C71.9976 51.3631 89.8723 50.1856 144 50.1856C142.763 37.9666 133.055 24.5334 123.615 16.8822C112.264 7.73637 98.3929 2.31491 84.0032 0.356431C80.1116 -0.02489 76.1477 0.00753451 72.2268 0.0396069L71.931 0.0420202C69.4927 0.0617318 66.6695 -0.0934234 64.2476 0.0925683C44.4512 1.6129 24.2206 10.6244 11.6695 26.2485C3.90027 35.9199 -0.43227 46.9941 0.0341583 59.3413C0.135811 61.6238 -0.0459885 63.8996 0.26366 66.2154C4.10945 95.0047 32.541 114.489 59.8449 117.704C64.0488 118.074 68.2815 117.965 72.5065 117.971C75.1023 117.975 77.8139 118.046 80.4223 117.95C100.444 117.218 121.074 107.14 133.494 91.4018Z" fill="#E7242C"/>
                </svg>
                <div class="brand-text">
                    <span class="brand-company">遠雄人壽</span>
                </div>
            </div>
            <p class="brand-tagline">智能化服務，讓保險查詢更簡單</p>
        </div>

        <h2 class="cards-title">您好，請問需要哪方面的協助？</h2>

        <div class="mode-cards">
            <div class="mode-card" onclick="enterChat('terms')">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <div class="card-title">保險條款諮詢</div>
                <div class="card-desc">了解保障範圍、保單條款、除外事項及各版本條款差異</div>
                <div class="card-cta">
                    開始諮詢
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                    </svg>
                </div>
            </div>

            <div class="mode-card" onclick="enterChat('claims')">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <div class="card-title">理賠諮詢</div>
                <div class="card-desc">查詢理賠條件、申請流程、所需文件及可獲賠付金額計算</div>
                <div class="card-cta">
                    開始諮詢
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="landing-footer">
            © 2025 遠雄人壽保險事業股份有限公司<br>
            本服務由 AI 輔助提供，實際理賠以保單條款為準，如有疑問請洽詢客服專線
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     CHAT
══════════════════════════════════════════ -->
<div id="screen-chat" class="screen">
    <header class="chat-header">
        <!-- Left: back + logo + company -->
        <div class="h-left">
            <button class="back-btn" onclick="goToLanding()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </button>
            <svg class="h-logo" viewBox="0 0 144 118" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M133.494 91.4018C138.591 84.9436 143.944 74.8739 143.982 66.82C128.359 66.973 112.735 67.0103 97.1122 66.9315L85.5354 66.9192C82.0714 66.9063 78.4166 66.6879 75.0017 67.3524C72.7199 67.7964 70.6601 68.9955 69.0515 70.664C63.5669 76.3526 55.1847 93.8431 49.4468 97.0127C46.9472 98.3935 43.7445 98.4913 40.9583 98.5569C37.7887 98.6316 34.6103 98.5961 31.4397 98.5782C34.1483 93.3528 36.5444 90.2013 39.8389 85.3386L48.3318 72.6197C54.3946 63.6795 57.5067 55.8325 68.5342 52.3289C68.9619 52.1938 69.3928 52.068 69.8262 51.9518C71.9976 51.3631 89.8723 50.1856 144 50.1856C142.763 37.9666 133.055 24.5334 123.615 16.8822C112.264 7.73637 98.3929 2.31491 84.0032 0.356431C80.1116 -0.02489 76.1477 0.00753451 72.2268 0.0396069L71.931 0.0420202C69.4927 0.0617318 66.6695 -0.0934234 64.2476 0.0925683C44.4512 1.6129 24.2206 10.6244 11.6695 26.2485C3.90027 35.9199 -0.43227 46.9941 0.0341583 59.3413C0.135811 61.6238 -0.0459885 63.8996 0.26366 66.2154C4.10945 95.0047 32.541 114.489 59.8449 117.704C64.0488 118.074 68.2815 117.965 72.5065 117.971C75.1023 117.975 77.8139 118.046 80.4223 117.95C100.444 117.218 121.074 107.14 133.494 91.4018Z" fill="#E7242C"/>
            </svg>
            <span class="h-company">遠雄人壽</span>
            <div class="h-sep"></div>
        </div>

        <!-- Right: mode tabs + theme toggle -->
        <div class="h-right">
            <div class="mode-tabs">
                <button class="mode-tab active" id="tab-terms" onclick="switchMode('terms')">保險條款諮詢</button>
                <button class="mode-tab" id="tab-claims" onclick="switchMode('claims')">理賠諮詢</button>

// ─── PDF ──────────────────────────────────────────────────────
async function loadPdf(fileName) {
    const res = await fetch(fileName);
    if (!res.ok) throw new Error(`無法載入: ${fileName}`);
    const buf = await res.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for (let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const ct   = await page.getTextContent();
        text += `\n[第 ${i} 頁]\n${ct.items.map(x=>x.str).join(' ')}\n`;
    }
    return text.trim();
}

// ─── API ──────────────────────────────────────────────────────
async function callClaude(messages, sys, retry=0) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4096, system:sys, messages })
    });
    if (!res.ok) {
        const err = await res.json();
        const msg = err.error?.message || 'API 呼叫失敗';
        const retryable = msg.toLowerCase().includes('rate limit')||msg.toLowerCase().includes('overloaded')||[429,529,503].includes(res.status);
        if (retryable && retry<3) {
            const w = retry===0?30:65;
            addMessage(`遇到 ${msg}，等待 ${w} 秒後重試（${retry+1}/3）...`,'assistant');
            await new Promise(r=>setTimeout(r,w*1000));
            return callClaude(messages, sys, retry+1);
        }
        throw new Error(msg);
    }
    return (await res.json()).content[0].text;
}

// ─── MULTI-FILE ───────────────────────────────────────────────
function isMultiFile(msg) {
    const kw=['哪些','比較','所有','每個','全部','都有','各個','一覽','整理','列出所有','有哪些','兩種','三種','多種','幾種','兩份','多份','幾份'];
    if (kw.some(k=>msg.includes(k))) return true;
    const c=msg.match(/HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3]/gi);
    return c&&c.length>=2;
}
function extractFiles(msg) {
    const c=msg.match(/HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3]/gi);
    if (!c) return null;
    const u=[...new Set(c.map(x=>x.toUpperCase()))];
    const r=u.map(code=>PDF_FILES.find(f=>f.file.toUpperCase().includes(code))).filter(Boolean);
    return r.length>0?r:null;
}

async function batchQuery(userMessage) {
    const specified=extractFiles(userMessage);
    const files=specified||PDF_FILES;

    const uid = startBatchBubble();
    updateBatchStatus(uid,
        specified ? `分析 ${files.length} 份指定保單...` : `分批分析全部 ${files.length} 份文件...`);

    const BATCH=2; const batches=[];
    for (let i=0;i<files.length;i+=BATCH) batches.push(files.slice(i,i+BATCH));
    const results=[];

    for (let i=0;i<batches.length;i++) {
        const batch=batches[i];
        const batchDesc = batch.map(f=>f.desc).join('、');
        updateBatchStatus(uid, `正在分析第 ${i+1}/${batches.length} 批...`, `第 ${i+1}/${batches.length} 批：${batchDesc}`);
        showLoading(`分析第 ${i+1}/${batches.length} 批`, batchDesc);
        let batchText='';
        for (const f of batch) {
            try { batchText+=`\n\n===== ${f.desc} =====\n${await loadPdf(f.file)}`; }
            catch(e) { batchText+=`\n\n===== ${f.desc} =====\n[載入失敗]`; }
        }
        hideLoading();
        const sp=`${SYSTEM_PROMPTS[currentMode]}\n\n以下是保險文件內容：\n\n${batchText}`;
        const resp=await callClaude([{role:'user',content:userMessage}],sp);
        results.push({files:batch.map(f=>f.desc),response:resp});
        if (i<batches.length-1) {
            updateBatchStatus(uid, '等待 API 速率限制 (65s)...', '等待 65 秒以避免速率限制');
            await new Promise(r=>setTimeout(r,65000));
        }
    }

    updateBatchStatus(uid, '統整所有分析結果...', '等待 65 秒後統整');
    await new Promise(r=>setTimeout(r,65000));
    updateBatchStatus(uid, '正在統整中...');
    const allText=results.map(r=>`【${r.files.join('、')}】\n${r.response}`).join('\n\n');
    const sp2=`請統整以下分批保險文件分析結果，回答使用者的問題。\n原始問題：${userMessage}\n\n各批結果：\n${allText}\n\n整合所有資訊，去除重複，用清晰格式呈現。`;
    const final=await callClaude([{role:'user',content:'請統整以上分析結果'}],sp2);
    hideTyping();
    finalizeBatchBubble(uid, final);
    currentState='conversation'; currentPdfFile='多檔模式';
    currentPdfText=results.map(r=>`[${r.files.join('、')}]\n${r.response}`).join('\n\n');
    conversationHistory=[{role:'user',content:userMessage},{role:'assistant',content:final}];
    showFileBar(`多檔模式 - ${files.length} 份文件`);
}

// ─── STATE HANDLERS ───────────────────────────────────────────
async function handleIdle(msg) {
    originalQuestion=msg;
    if (isMultiFile(msg)) { hideTyping(); await batchQuery(msg); return; }

    const fileList=PDF_FILES.map((f,i)=>`[${i+1}] ${f.desc} (${f.file})`).join('\n');
    const sp=`你是保險文件分類助理。根據使用者問題判斷要查詢哪份文件。\n\n可用文件：\n${fileList}\n\n【情況一：明確指定保險名稱或代號】直接推薦，格式：「根據您的問題，判斷需要查詢【文件描述】。\n請確認是否要查詢 [完整檔案名.pdf]？(回覆「是」繼續)」\n\n【情況二：通用問題，未指定保險】詢問用戶：「您的問題是通用性問題，請問要查詢哪一份保險？\n\n可選：\n• 終身醫療：HJ1~HJ5\n• 癌症險：HG3~HG6\n• 住院醫療：RSJ/RSK/RSL/RSM\n• 實支實付：RJ1/RM1~RM3」\n\n關鍵字：溫馨/終身醫療→HJ系列｜癌症→HG系列｜安心/住院→RS系列｜康富/實支→RJ1/RM系列`;
    const resp=await callClaude([{role:'user',content:msg}],sp);
    hideTyping(); addMessage(resp,'assistant');
    const isRec=resp.includes('請確認是否要查詢')||resp.includes('確認是否查詢');
    if (isRec) {
        for (const f of PDF_FILES) { if(resp.includes(f.file)){pendingPdfFile=f.file;break;} }
        if (!pendingPdfFile) { const m=resp.match(/\b(HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3])\b/i); if(m){const f=PDF_FILES.find(x=>x.file.toUpperCase().includes(m[1].toUpperCase()));if(f)pendingPdfFile=f.file;} }
    }
    if (pendingPdfFile) { currentState='waiting_confirmation'; } else { currentState='waiting_file_selection'; }
}

async function handleFileSelect(msg) {
    const cm=msg.match(/\b(HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3])\b/i);
    if (cm) {
        const f=PDF_FILES.find(x=>x.file.toUpperCase().includes(cm[1].toUpperCase()));
        if (f) { pendingPdfFile=f.file; hideTyping(); addMessage(`好的，將查詢「${f.desc}」。\n\n請確認是否要查詢 ${f.file}？(回覆「是」繼續)`,'assistant'); currentState='waiting_confirmation'; return; }
    }
    const m=msg.toLowerCase(); let matched=null;
    if (m.includes('溫馨')||m.includes('終身醫療')) matched=PDF_FILES.find(f=>f.file.includes('HJ5'));
    else if (m.includes('癌症')) matched=PDF_FILES.find(f=>f.file.includes('HG6'));
    else if (m.includes('真安心')) matched=PDF_FILES.find(f=>f.file.includes('RSL'));
    else if (m.includes('好安心')) matched=PDF_FILES.find(f=>f.file.includes('RSM'));
    else if (m.includes('永康富')) matched=PDF_FILES.find(f=>f.file.includes('RM3'));
    else if (m.includes('安心康富')) matched=PDF_FILES.find(f=>f.file.includes('RM2'));
    else if (m.includes('新康富')) matched=PDF_FILES.find(f=>f.file.includes('RM1'));
    else if (m.includes('康富')) matched=PDF_FILES.find(f=>f.file.includes('RJ1'));
    if (matched) { pendingPdfFile=matched.file; hideTyping(); addMessage(`好的，將查詢「${matched.desc}」。\n\n請確認是否要查詢 ${matched.file}？(回覆「是」繼續)`,'assistant'); currentState='waiting_confirmation'; }
    else { hideTyping(); addMessage('抱歉，無法識別您指定的保險。請輸入代號（如 HJ3、RSJ）或保險名稱（如 新溫馨、癌症險）。','assistant'); }
}

async function handleConfirm(msg) {
    const yes=['是','對','確認','yes','ok','好','沒錯','正確','y'].some(k=>msg.toLowerCase().includes(k));
    if (yes&&pendingPdfFile) {
        showLoading('正在讀取文件',pendingPdfFile);
        try {
            currentPdfText=await loadPdf(pendingPdfFile); currentPdfFile=pendingPdfFile; pendingPdfFile=null;
            hideLoading();
            const info=PDF_FILES.find(f=>f.file===currentPdfFile);
            showFileBar(info?.desc||currentPdfFile); hideTyping();
            currentState='conversation'; conversationHistory=[];
            if (originalQuestion) { addMessage(`已載入「${info?.desc}」\n\n正在回答您的問題：「${originalQuestion}」`,'assistant', info?.desc||currentPdfFile); showTyping(); await handleConversation(originalQuestion); originalQuestion=''; }
            else { addMessage(`已載入「${info?.desc}」，共擷取 ${currentPdfText.length} 個字元。請問您想了解什麼？`,'assistant', info?.desc||currentPdfFile); }
        } catch(err) { hideLoading(); hideTyping(); addMessage(`無法載入「${pendingPdfFile}」。錯誤：${err.message}`,'assistant'); currentState='idle'; pendingPdfFile=null; }
    } else { currentState='idle'; pendingPdfFile=null; await handleIdle(msg); }
}

async function handleConversation(msg) {
    if (['換檔案','換文件','其他文件','重新選擇','換一個'].some(k=>msg.includes(k))) { resetConversation(); hideTyping(); addMessage('好的，請問您想查詢什麼問題？我會幫您找到對應的文件。','assistant'); return; }
    conversationHistory.push({role:'user',content:msg});
    const sp=`${SYSTEM_PROMPTS[currentMode]}\n\n以下是文件內容：\n${currentPdfText}`;
    const resp=await callClaude(conversationHistory,sp);
    const info=PDF_FILES.find(f=>f.file===currentPdfFile);
    const pdfTag=info ? info.desc : (currentPdfFile&&currentPdfFile!=='多檔模式' ? currentPdfFile : null);
    hideTyping(); addMessage(resp,'assistant',pdfTag);
    conversationHistory.push({role:'assistant',content:resp});
}

// ─── SEND ─────────────────────────────────────────────────────
async function sendMessage() {
    const inp=document.getElementById('inputField');
    const msg=inp.value.trim(); if (!msg) return;
    inp.value=''; inp.style.height='auto';
    addMessage(msg,'user'); setInput(false); showTyping();
    try {
        if      (currentState==='idle')                   await handleIdle(msg);
        else if (currentState==='waiting_file_selection') await handleFileSelect(msg);
        else if (currentState==='waiting_confirmation')   await handleConfirm(msg);
        else if (currentState==='conversation')           await handleConversation(msg);
    } catch(err) { hideTyping(); addMessage(`發生錯誤：${err.message}`,'assistant'); }
    setInput(true); document.getElementById('inputField').focus();
}

// ─── RESET ────────────────────────────────────────────────────
function resetConversation() {
    currentState='idle'; conversationHistory=[]; currentPdfFile=null; currentPdfText=''; pendingPdfFile=null; originalQuestion='';
    hideFileBar(); renderWelcome();
}

// ─── EVENTS ───────────────────────────────────────────────────
// ─── CURSOR-TRACKED LIGHT ORBS ────────────────────────────────
(function() {
    const o1 = document.getElementById('orb1');
    const o2 = document.getElementById('orb2');
    const o3 = document.getElementById('orb3');
    let tx = 0, ty = 0;           // target normalized -1…1
    let x1=0,y1=0, x2=0,y2=0, x3=0,y3=0;  // current orb positions
    const lerp = (a,b,t) => a + (b-a)*t;
    const cards = document.querySelectorAll('.mode-card');

    document.getElementById('screen-landing').addEventListener('mousemove', e => {
        const w = window.innerWidth, h = window.innerHeight;
        tx = (e.clientX / w - 0.5) * 2;   // -1 … 1
        ty = (e.clientY / h - 0.5) * 2;
        // Update spotlight position on each card relative to cursor
        cards.forEach(card => {
            const r = card.getBoundingClientRect();
            card.style.setProperty('--cx', `${e.clientX - r.left}px`);
            card.style.setProperty('--cy', `${e.clientY - r.top}px`);
        });
    });

    function tick() {
        // orb1 follows cursor closely, large range
        x1 = lerp(x1, tx * 90, 0.04);
        y1 = lerp(y1, ty * 90, 0.04);
        // orb2 drifts opposite, slightly slower
        x2 = lerp(x2, -tx * 70, 0.03);
        y2 = lerp(y2, -ty * 70, 0.03);
        // orb3 subtle, faster response
        x3 = lerp(x3, tx * 45, 0.06);
        y3 = lerp(y3, ty * 45, 0.06);

        o1.style.transform = `translate(${x1}px,${y1}px)`;
        o2.style.transform = `translate(${x2}px,${y2}px)`;
        o3.style.transform = `translate(${x3}px,${y3}px)`;
        requestAnimationFrame(tick);
    }
    tick();
})();

function handleKeyDown(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
document.getElementById('inputField').addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });
renderWelcome();
</script>
