<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠雄人壽 AI 保險助理</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ══════════════════════════════════
           THEME VARIABLES
        ══════════════════════════════════ */
        :root {
            /* Brand */
            --red: #E7242C;
            --red-dark: #C41E24;
            --red-light: #FFF0F0;

            /* Chat (unchanged in both themes) */
            --white: #FFFFFF;
            --gray-50: #F8FAFC;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-300: #CBD5E1;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1E293B;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.12);

        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            position: fixed; inset: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1);
        }
        .screen.active { opacity: 1; pointer-events: all; }

        /* ══════════════════════════════════
           CHAT HEADER
        ══════════════════════════════════ */
        #screen-chat { background: var(--gray-50); display: flex; flex-direction: column; }

        /* ── BODY: sidebar + chat ── */
        .chat-body {
            flex: 1; overflow: hidden;
            display: flex; flex-direction: row;
        }
        .chat-sidebar {
            width: 192px; flex-shrink: 0;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex; flex-direction: column;
            padding: 1.25rem 0 1rem;
            overflow-y: auto;
        }
        .sidebar-label {
            font-size: 0.62rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.09em;
            color: var(--gray-400); padding: 0 1rem 0.75rem;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.6rem 1rem;
            cursor: pointer; transition: all 0.15s;
            border: none; border-left: 3px solid transparent;
            font-size: 0.838rem; color: var(--gray-600); font-weight: 500;
            font-family: inherit; width: 100%; text-align: left;
            background: none;
        }
        .sidebar-item:hover { background: var(--gray-50); color: var(--gray-800); }
        .sidebar-item.active {
            border-left-color: var(--sb-color);
            background: var(--sb-bg);
            color: var(--sb-color);
            font-weight: 600;
        }
        .sidebar-item-icon {
            width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--gray-100); transition: background 0.15s;
        }
        .sidebar-item.active .sidebar-item-icon { background: var(--sb-icon-bg); }
        .sidebar-item-icon svg { width: 15px; height: 15px; }
        .sidebar-item-text { display: flex; flex-direction: column; gap: 0.18rem; }
        .sidebar-item-desc {
            font-size: 0.68rem; font-weight: 400;
            color: var(--gray-400); line-height: 1.45;
            white-space: normal;
        }
        .sidebar-item.active .sidebar-item-desc { color: var(--sb-color); opacity: 0.65; }

        /* 800px centred column */
        .chat-wrap {
            flex: 1; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .chat-inner {
            max-width: 800px; width: 100%;
            margin: 0 auto;
            flex: 1; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .chat-header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            height: 60px; padding: 0 1.25rem;
            display: flex; align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0; z-index: 10;
        }
        .h-left {
            display: flex; align-items: center;
            gap: 0.7rem; flex-shrink: 0;
        }
        .h-logo { width: 28px; height: 23px; }
        .h-company { font-size: 0.875rem; font-weight: 600; color: var(--gray-800); }
        .h-sep { width: 1px; height: 14px; background: var(--gray-200); }
        .h-platform { font-size: 0.8rem; font-weight: 500; color: var(--gray-500); letter-spacing: 0.01em; }

        /* Mode tabs — RIGHT side of header */
        .h-right {
            display: flex; align-items: center;
        }

        /* File bar */
        .file-bar {
            display: none; align-items: center; justify-content: space-between;
            padding: 0.5rem 1.25rem;
            background: linear-gradient(135deg, #FFF5F5, #FFF0F0);
            border-bottom: 1px solid #FECACA; flex-shrink: 0;
        }
        .file-bar.on { display: flex; }
        .file-bar-left { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--red-dark); font-weight: 500; }
        .file-bar-left svg { width: 15px; height: 15px; }
        .change-btn {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.28rem 0.7rem; background: var(--white);
            border: 1px solid #FECACA; border-radius: 6px;
            font-size: 0.75rem; color: var(--red-dark);
            cursor: pointer; transition: all 0.2s;
        }
        .change-btn:hover { background: var(--red); color: var(--white); border-color: var(--red); }
        .change-btn svg { width: 12px; height: 12px; }

        /* Messages */
        .chat-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .messages {
            flex: 1; overflow-y: auto; padding: 1.25rem;
            display: flex; flex-direction: column; gap: 0.875rem;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

        /* Welcome */
        .welcome-wrap {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; padding: 2.5rem 1.5rem; text-align: center;
        }
        .welcome-ring {
            position: relative; width: 76px; height: 76px;
            margin: 0 auto 1.5rem;
        }
        .welcome-ring::before, .welcome-ring::after {
            content: ''; position: absolute; border-radius: 50%;
            border: 1.5px solid rgba(231,36,44,0.12);
        }
        .welcome-ring::before { inset: -10px; }
        .welcome-ring::after  { inset: -20px; }
        .welcome-icon {
            width: 76px; height: 76px;
            background: linear-gradient(135deg, var(--red-light), #FFE4E4);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
        }
        .welcome-icon svg { width: 36px; height: 36px; color: var(--red); }
        .welcome-title { font-size: 1.175rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0; }
        .welcome-subtitle { font-size: 0.82rem; font-weight: 500; color: var(--gray-400); margin-top: 0.55rem; letter-spacing: 0.01em; }
        .welcome-desc  { font-size: 0.875rem; color: var(--gray-500); line-height: 1.7; max-width: 340px; margin-top: 1.1rem; }
        .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 1.25rem; max-width: 480px; }
        .chip {
            padding: 0.38rem 0.85rem;
            background: var(--white); border: 1.5px solid var(--gray-200);
            border-radius: 9999px; font-size: 0.78rem; color: var(--gray-600);
            cursor: pointer; transition: all 0.2s;
        }
        .chip:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

        /* Message bubbles */
        .msg {
            display: flex; gap: 0.625rem; max-width: 80%;
            animation: msgIn 0.3s cubic-bezier(0.4,0,0.2,1) both;
        }
        @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-av {
            width: 32px; height: 32px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
        }
        .msg.assistant .msg-av { background: var(--white); border: 1px solid var(--gray-100); }
        .msg.user       .msg-av { background: var(--gray-200); color: var(--gray-600); }
        .msg-body { display: flex; flex-direction: column; gap: 0.2rem; }
        .msg-text { padding: 0.8rem 1rem; border-radius: 13px; line-height: 1.65; font-size: 0.875rem; }
        .msg.assistant .msg-text { background: var(--white); color: var(--gray-800); border-bottom-left-radius: 3px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); }
        .msg.user       .msg-text { background: linear-gradient(135deg, var(--red), var(--red-dark)); color: var(--white); border-bottom-right-radius: 3px; }
        .msg-time { font-size: 0.67rem; color: var(--gray-400); padding: 0 0.2rem; }
        .msg.user .msg-time { text-align: right; }

        /* Typing indicator */
        .typing-row { display: flex; gap: 0.625rem; align-items: flex-end; }
        .typing-av {
            width: 32px; height: 32px; border-radius: 9px;
            background: var(--white); border: 1px solid var(--gray-100);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .typing-bubble {
            background: var(--white); border: 1px solid var(--gray-100);
            border-radius: 13px; border-bottom-left-radius: 3px;
            padding: 0.875rem 1rem; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 5px;
        }
        .td { width: 7px; height: 7px; border-radius: 50%; background: var(--red); opacity: 0.6; animation: wave 1.4s ease-in-out infinite; }
        .td:nth-child(2) { animation-delay: 0.2s; }
        .td:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%,60%,100%{transform:translateY(0);opacity:0.6} 30%{transform:translateY(-7px);opacity:1} }

        /* Input tabs row (above text field) */
        .input-top-row {
            display: flex; justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        /* Input */
        .input-area { padding: 0.875rem 1.25rem; background: var(--white); border-top: 1px solid var(--gray-100); flex-shrink: 0; }
        .input-wrap {
            display: flex; gap: 0.625rem; align-items: flex-end;
            background: var(--gray-50); border: 2px solid var(--gray-200);
            border-radius: 15px; padding: 0.5rem 0.5rem 0.5rem 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrap:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(231,36,44,0.07); background: var(--white); }
        .input-field {
            flex: 1; border: none; background: transparent;
            font-size: 0.875rem; color: var(--gray-800);
            resize: none; min-height: 24px; max-height: 120px;
            font-family: inherit; line-height: 1.5; outline: none;
        }
        .input-field::placeholder { color: var(--gray-400); }
        .send-btn {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            border: none; border-radius: 9px; color: var(--white);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 12px rgba(231,36,44,0.4); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .send-btn svg { width: 17px; height: 17px; }

        /* ══════════════════════════════════
           LOADING OVERLAY
        ══════════════════════════════════ */
        .ov {
            position: fixed; inset: 0;
            background: rgba(6,9,15,0.8);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .ov.on { opacity: 1; pointer-events: all; }
        .ov-card {
            background: var(--white); border-radius: 22px;
            padding: 2.5rem; max-width: 290px; width: 90%;
            display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .doc-wrap { position: relative; width: 68px; height: 82px; }
        .doc-ring { position: absolute; inset: -12px; border-radius: 15px; border: 1.5px solid rgba(231,36,44,0.2); animation: dRing 2s ease-in-out infinite; }
        @keyframes dRing { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
        .doc-body { position: absolute; inset: 0; background: var(--gray-50); border: 2px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
        .doc-fold { position: absolute; top: 0; right: 0; width: 16px; height: 16px; background: var(--gray-200); clip-path: polygon(100% 0, 0 0, 100% 100%); }
        .doc-lns { position: absolute; top: 22px; left: 9px; right: 9px; display: flex; flex-direction: column; gap: 6px; }
        .doc-ln { height: 4px; background: var(--gray-200); border-radius: 2px; }
        .doc-ln:last-child { width: 55%; }
        .scan-glow { position: absolute; left: 0; right: 0; height: 16px; background: linear-gradient(to bottom, transparent, rgba(231,36,44,0.07), transparent); animation: scanMove 2s ease-in-out infinite; top: 6%; }
        .scan-beam { position: absolute; left: 0; right: 0; height: 1.5px; background: linear-gradient(90deg, transparent 5%, var(--red) 40%, var(--red) 60%, transparent 95%); box-shadow: 0 0 6px var(--red), 0 0 12px rgba(231,36,44,0.2); animation: scanMove 2s ease-in-out infinite; top: 8%; }
        @keyframes scanMove { 0%{top:8%} 50%{top:80%} 100%{top:8%} }
        .ov-title { font-size: 0.975rem; font-weight: 600; color: var(--gray-800); text-align: center; }
        .ov-sub { font-size: 0.78rem; color: var(--gray-400); text-align: center; margin-top: -0.625rem; }
        .ov-bar { width: 100%; height: 3px; background: var(--gray-100); border-radius: 9999px; overflow: hidden; }
        .ov-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--red-dark)); border-radius: 9999px; animation: barFill 2.5s ease-in-out infinite; }
        @keyframes barFill { 0%{width:0%} 65%{width:80%} 100%{width:100%} }

        /* ══════════════════════════════════
           MODAL
        ══════════════════════════════════ */
        .modal-ov {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .modal-ov.on { opacity: 1; pointer-events: all; }
        .modal-card {
            background: var(--white); border-radius: 20px;
            padding: 2rem; max-width: 340px; width: 90%;
            box-shadow: var(--shadow-xl);
            transform: translateY(12px) scale(0.97);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-ov.on .modal-card { transform: translateY(0) scale(1); }
        .modal-ico { width: 48px; height: 48px; border-radius: 13px; background: #FFF7ED; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .modal-ico svg { width: 24px; height: 24px; color: #F59E0B; }
        .modal-title { font-size: 1.05rem; font-weight: 700; color: var(--gray-800); margin-bottom: 0.4rem; }
        .modal-desc { font-size: 0.845rem; color: var(--gray-500); line-height: 1.65; margin-bottom: 1.25rem; }
        .modal-btns { display: flex; gap: 0.625rem; }
        .btn-cancel { flex: 1; padding: 0.65rem; border: 1.5px solid var(--gray-200); border-radius: 9px; background: transparent; font-size: 0.845rem; color: var(--gray-600); cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn-cancel:hover { border-color: var(--gray-300); background: var(--gray-50); }
        .btn-confirm { flex: 1; padding: 0.65rem; border: none; border-radius: 9px; background: linear-gradient(135deg, var(--red), var(--red-dark)); font-size: 0.845rem; color: var(--white); cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-confirm:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(231,36,44,0.35); }

        /* ══════════════════════════════════
           CHAT DARK MODE
        ══════════════════════════════════ */
        [data-theme="dark"] #screen-chat              { background: #0B1120; }
        [data-theme="dark"] .chat-header              { background: #0D1526; border-color: rgba(255,255,255,0.06); box-shadow: none; }
        [data-theme="dark"] .h-company                { color: #CBD5E1; }
        [data-theme="dark"] .h-sep                    { background: rgba(255,255,255,0.08); }
        [data-theme="dark"] .h-theme-btn              { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
        [data-theme="dark"] .h-theme-btn:hover        { background: rgba(255,255,255,0.1); }
        [data-theme="dark"] .file-bar                 { background: rgba(231,36,44,0.07); border-color: rgba(231,36,44,0.15); }
        [data-theme="dark"] .file-bar-left            { color: #FCA5A5; }
        [data-theme="dark"] .change-btn               { background: rgba(255,255,255,0.05); border-color: rgba(231,36,44,0.2); color: #FCA5A5; }
        [data-theme="dark"] .chat-main,
        [data-theme="dark"] .messages                 { background: #0B1120; }
        [data-theme="dark"] .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
        [data-theme="dark"] .msg.assistant .msg-text  { background: #141E30; border-color: rgba(255,255,255,0.06); color: #D1D5DB; }
        [data-theme="dark"] .msg.assistant .msg-av     { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .typing-av                { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .msg.user .msg-av         { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.55); }
        [data-theme="dark"] .msg-time                 { color: rgba(255,255,255,0.2); }
        [data-theme="dark"] .typing-bubble            { background: #141E30; border-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .input-area               { background: #0D1526; border-color: rgba(255,255,255,0.05); }
        [data-theme="dark"] .input-wrap               { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .input-wrap:focus-within  { border-color: var(--red); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(231,36,44,0.1); }
        [data-theme="dark"] .input-field              { color: #E2E8F0; }
        [data-theme="dark"] .input-field::placeholder { color: rgba(255,255,255,0.22); }
        [data-theme="dark"] .welcome-icon             { background: rgba(231,36,44,0.1); }
        [data-theme="dark"] .welcome-ring::before,
        [data-theme="dark"] .welcome-ring::after      { border-color: rgba(231,36,44,0.1); }
        [data-theme="dark"] .welcome-title            { color: #E2E8F0; }
        [data-theme="dark"] .welcome-desc             { color: rgba(255,255,255,0.4); }
        [data-theme="dark"] .chip                     { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.48); }
        [data-theme="dark"] .chip:hover               { border-color: var(--red); color: var(--red); background: rgba(231,36,44,0.08); }

        /* ══════════════════════════════════
           ANALYSIS + PDF TAG
        ══════════════════════════════════ */

        /* Header theme button */
        .h-theme-btn {
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--gray-100); border: 1px solid var(--gray-200);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--gray-500); margin-left: 0.5rem;
            transition: all 0.2s; position: relative; flex-shrink: 0;
        }
        .h-theme-btn:hover { background: var(--gray-200); }
        .h-theme-btn svg { width: 14px; height: 14px; }
        .h-theme-btn .icon-sun, .h-theme-btn .icon-moon { position: absolute; transition: opacity 0.25s; }
        .h-theme-btn .icon-moon { opacity: 0; }
        [data-theme="light"] .h-theme-btn .icon-sun  { opacity: 0; }
        [data-theme="light"] .h-theme-btn .icon-moon { opacity: 1; }

        /* AI avatar with logo */
        .msg.assistant .msg-av { padding: 5px; }
        .msg.assistant .msg-av svg { width: 100%; height: 100%; }
        .typing-av { padding: 5px; }
        .typing-av svg { width: 100%; height: 100%; }

        /* PDF tag in message */
        .pdf-tag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.2rem 0.55rem;
            background: var(--gray-100); border: 1px solid var(--gray-200);
            border-radius: 5px; font-size: 0.7rem; color: var(--gray-500);
            margin-bottom: 0.6rem; max-width: 100%;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .pdf-tag svg { width: 11px; height: 11px; flex-shrink: 0; color: var(--gray-400); }
        [data-theme="dark"] .pdf-tag { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); }
        [data-theme="dark"] .pdf-tag svg { color: rgba(255,255,255,0.28); }

        /* Analysis collapsible */
        .analysis-wrap { margin-bottom: 0.55rem; }
        .analysis-toggle {
            display: inline-flex; align-items: center; gap: 0.28rem;
            background: none; border: none; cursor: pointer; padding: 0;
            font-size: 0.7rem; font-family: inherit;
            color: var(--gray-400); transition: color 0.2s; user-select: none;
        }
        .analysis-toggle:hover { color: var(--gray-600); }
        .analysis-toggle .chev { width: 10px; height: 10px; transition: transform 0.2s; flex-shrink: 0; }

            display: none; margin-top: 0.3rem;
            padding: 0.35rem 0 0.2rem 0.7rem;
            border-left: 1.5px solid var(--gray-200);

        [data-theme="dark"] .analysis-steps           { border-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .analysis-step            { color: rgba(255,255,255,0.27); }
        [data-theme="dark"] .analysis-divider         { border-color: rgba(255,255,255,0.07); }

        .batch-prog { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.15rem; }
        .batch-prog-dots { display: flex; gap: 3px; align-items: center; }
        .batch-prog-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gray-400); animation: bsDot 1.4s ease-in-out infinite; }

        .batch-prog-text { font-size: 0.75rem; color: var(--gray-400); }
        [data-theme="dark"] .batch-prog-dot  { background: rgba(255,255,255,0.3); }
        [data-theme="dark"] .batch-prog-text { color: rgba(255,255,255,0.3); }

        /* ══════════════════════════════════

        ══════════════════════════════════ */
        @media (max-width: 600px) {
            .chat-header { padding: 0 0.875rem; }
            .h-company, .h-sep { display: none; }
            .messages { padding: 1rem; }
            .input-area { padding: 0.75rem; }

function switchMode(mode) {
    if (mode === currentMode) return;
    if (conversationHistory.length > 0 || currentPdfFile) {
        pendingModeSwitch = mode;
        document.getElementById('switchModal').classList.add('on');
        return;
    }
    applyModeSwitch(mode);
}
function cancelSwitch()  { pendingModeSwitch = null; document.getElementById('switchModal').classList.remove('on'); }
function confirmSwitch() {
    if (pendingModeSwitch) { applyModeSwitch(pendingModeSwitch); pendingModeSwitch = null; }
    document.getElementById('switchModal').classList.remove('on');
}

function getTime() { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML.replace(/\n/g,'<br>'); }
function renderContent(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

// ─── PDF ──────────────────────────────────────────────────────
async function loadPdf(fileName) {
    const res = await fetch(fileName);
    if (!res.ok) throw new Error(`無法載入: ${fileName}`);
    const buf = await res.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for (let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const ct   = await page.getTextContent();
        text += `\n[第 ${i} 頁]\n${ct.items.map(x=>x.str).join(' ')}\n`;
    }
    return text.trim();
}

// ─── API ──────────────────────────────────────────────────────
async function callClaude(messages, sys, retry=0) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4096, system:sys, messages })
    });
    if (!res.ok) {
        const err = await res.json();
        const msg = err.error?.message || 'API 呼叫失敗';
        const retryable = msg.toLowerCase().includes('rate limit')||msg.toLowerCase().includes('overloaded')||[429,529,503].includes(res.status);
        if (retryable && retry<3) {
            const w = retry===0?30:65;
            addMessage(`遇到 ${msg}，等待 ${w} 秒後重試（${retry+1}/3）...`,'assistant');
            await new Promise(r=>setTimeout(r,w*1000));
            return callClaude(messages, sys, retry+1);
        }
        throw new Error(msg);
    }
    return (await res.json()).content[0].text;
}

// ─── MULTI-FILE ───────────────────────────────────────────────
function isMultiFile(msg) {
    const kw=['哪些','比較','所有','每個','全部','都有','各個','一覽','整理','列出所有','有哪些','兩種','三種','多種','幾種','兩份','多份','幾份'];
    if (kw.some(k=>msg.includes(k))) return true;
    const c=msg.match(/HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3]/gi);
    return c&&c.length>=2;
}
function extractFiles(msg) {
    const c=msg.match(/HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3]/gi);
    if (!c) return null;
    const u=[...new Set(c.map(x=>x.toUpperCase()))];
    const r=u.map(code=>PDF_FILES.find(f=>f.file.toUpperCase().includes(code))).filter(Boolean);
    return r.length>0?r:null;
}

async function batchQuery(userMessage) {
    const specified=extractFiles(userMessage);
    const files=specified||PDF_FILES;

    const uid = startBatchBubble();
    updateBatchStatus(uid,
        specified ? `分析 ${files.length} 份指定保單...` : `分批分析全部 ${files.length} 份文件...`);

    const BATCH=2; const batches=[];
    for (let i=0;i<files.length;i+=BATCH) batches.push(files.slice(i,i+BATCH));
    const results=[];

    for (let i=0;i<batches.length;i++) {
        const batch=batches[i];
        const batchDesc = batch.map(f=>f.desc).join('、');
        updateBatchStatus(uid, `正在分析第 ${i+1}/${batches.length} 批...`, `第 ${i+1}/${batches.length} 批：${batchDesc}`);
        showLoading(`分析第 ${i+1}/${batches.length} 批`, batchDesc);
        let batchText='';
        for (const f of batch) {
            try { batchText+=`\n\n===== ${f.desc} =====\n${await loadPdf(f.file)}`; }
            catch(e) { batchText+=`\n\n===== ${f.desc} =====\n[載入失敗]`; }
        }
        hideLoading();
        const sp=`${SYSTEM_PROMPTS[currentMode]}\n\n以下是保險文件內容：\n\n${batchText}`;
        const resp=await callClaude([{role:'user',content:userMessage}],sp);
        results.push({files:batch.map(f=>f.desc),response:resp});
        if (i<batches.length-1) {
            updateBatchStatus(uid, '等待 API 速率限制 (65s)...', '等待 65 秒以避免速率限制');
            await new Promise(r=>setTimeout(r,65000));
        }
    }

    updateBatchStatus(uid, '統整所有分析結果...', '等待 65 秒後統整');
    await new Promise(r=>setTimeout(r,65000));
    updateBatchStatus(uid, '正在統整中...');
    const allText=results.map(r=>`【${r.files.join('、')}】\n${r.response}`).join('\n\n');
    const sp2=`請統整以下分批保險文件分析結果，回答使用者的問題。\n原始問題：${userMessage}\n\n各批結果：\n${allText}\n\n整合所有資訊，去除重複，用清晰格式呈現。`;
    const final=await callClaude([{role:'user',content:'請統整以上分析結果'}],sp2);
    hideTyping();
    finalizeBatchBubble(uid, final);
    currentState='conversation'; currentPdfFile='多檔模式';
    currentPdfText=results.map(r=>`[${r.files.join('、')}]\n${r.response}`).join('\n\n');
    conversationHistory=[{role:'user',content:userMessage},{role:'assistant',content:final}];
    showFileBar(`多檔模式 - ${files.length} 份文件`);
}

// ─── STATE HANDLERS ───────────────────────────────────────────
async function handleIdle(msg) {
    originalQuestion=msg;
    if (isMultiFile(msg)) { hideTyping(); await batchQuery(msg); return; }

    const fileList=PDF_FILES.map((f,i)=>`[${i+1}] ${f.desc} (${f.file})`).join('\n');
    const sp=`你是保險文件分類助理。根據使用者問題判斷要查詢哪份文件。\n\n可用文件：\n${fileList}\n\n【情況一：明確指定保險名稱或代號】直接推薦，格式：「根據您的問題，判斷需要查詢【文件描述】。\n請確認是否要查詢 [完整檔案名.pdf]？(回覆「是」繼續)」\n\n【情況二：通用問題，未指定保險】詢問用戶：「您的問題是通用性問題，請問要查詢哪一份保險？\n\n可選：\n• 終身醫療：HJ1~HJ5\n• 癌症險：HG3~HG6\n• 住院醫療：RSJ/RSK/RSL/RSM\n• 實支實付：RJ1/RM1~RM3」\n\n關鍵字：溫馨/終身醫療→HJ系列｜癌症→HG系列｜安心/住院→RS系列｜康富/實支→RJ1/RM系列`;
    const resp=await callClaude([{role:'user',content:msg}],sp);
    hideTyping(); addMessage(resp,'assistant');
    const isRec=resp.includes('請確認是否要查詢')||resp.includes('確認是否查詢');
    if (isRec) {
        for (const f of PDF_FILES) { if(resp.includes(f.file)){pendingPdfFile=f.file;break;} }
        if (!pendingPdfFile) { const m=resp.match(/\b(HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3])\b/i); if(m){const f=PDF_FILES.find(x=>x.file.toUpperCase().includes(m[1].toUpperCase()));if(f)pendingPdfFile=f.file;} }
    }
    if (pendingPdfFile) { currentState='waiting_confirmation'; } else { currentState='waiting_file_selection'; }
}

async function handleFileSelect(msg) {
    const cm=msg.match(/\b(HJ[1-5]|HG[3-6]|RSJ|RSK|RSL|RSM|RJ1|RM[1-3])\b/i);
    if (cm) {
        const f=PDF_FILES.find(x=>x.file.toUpperCase().includes(cm[1].toUpperCase()));
        if (f) { pendingPdfFile=f.file; hideTyping(); addMessage(`好的，將查詢「${f.desc}」。\n\n請確認是否要查詢 ${f.file}？(回覆「是」繼續)`,'assistant'); currentState='waiting_confirmation'; return; }
    }
    const m=msg.toLowerCase(); let matched=null;
    if (m.includes('溫馨')||m.includes('終身醫療')) matched=PDF_FILES.find(f=>f.file.includes('HJ5'));
    else if (m.includes('癌症')) matched=PDF_FILES.find(f=>f.file.includes('HG6'));
    else if (m.includes('真安心')) matched=PDF_FILES.find(f=>f.file.includes('RSL'));
    else if (m.includes('好安心')) matched=PDF_FILES.find(f=>f.file.includes('RSM'));
    else if (m.includes('永康富')) matched=PDF_FILES.find(f=>f.file.includes('RM3'));
    else if (m.includes('安心康富')) matched=PDF_FILES.find(f=>f.file.includes('RM2'));
    else if (m.includes('新康富')) matched=PDF_FILES.find(f=>f.file.includes('RM1'));
    else if (m.includes('康富')) matched=PDF_FILES.find(f=>f.file.includes('RJ1'));
    if (matched) { pendingPdfFile=matched.file; hideTyping(); addMessage(`好的，將查詢「${matched.desc}」。\n\n請確認是否要查詢 ${matched.file}？(回覆「是」繼續)`,'assistant'); currentState='waiting_confirmation'; }
    else { hideTyping(); addMessage('抱歉，無法識別您指定的保險。請輸入代號（如 HJ3、RSJ）或保險名稱（如 新溫馨、癌症險）。','assistant'); }
}

async function handleConfirm(msg) {
    const yes=['是','對','確認','yes','ok','好','沒錯','正確','y'].some(k=>msg.toLowerCase().includes(k));
    if (yes&&pendingPdfFile) {
        showLoading('正在讀取文件',pendingPdfFile);
        try {
            currentPdfText=await loadPdf(pendingPdfFile); currentPdfFile=pendingPdfFile; pendingPdfFile=null;
            hideLoading();
            const info=PDF_FILES.find(f=>f.file===currentPdfFile);
            showFileBar(info?.desc||currentPdfFile); hideTyping();
            currentState='conversation'; conversationHistory=[];
            if (originalQuestion) { addMessage(`已載入「${info?.desc}」\n\n正在回答您的問題：「${originalQuestion}」`,'assistant', info?.desc||currentPdfFile); showTyping(); await handleConversation(originalQuestion); originalQuestion=''; }
            else { addMessage(`已載入「${info?.desc}」，共擷取 ${currentPdfText.length} 個字元。請問您想了解什麼？`,'assistant', info?.desc||currentPdfFile); }
        } catch(err) { hideLoading(); hideTyping(); addMessage(`無法載入「${pendingPdfFile}」。錯誤：${err.message}`,'assistant'); currentState='idle'; pendingPdfFile=null; }
    } else { currentState='idle'; pendingPdfFile=null; await handleIdle(msg); }
}

async function handleConversation(msg) {
    if (['換檔案','換文件','其他文件','重新選擇','換一個'].some(k=>msg.includes(k))) { resetConversation(); hideTyping(); addMessage('好的，請問您想查詢什麼問題？我會幫您找到對應的文件。','assistant'); return; }
    conversationHistory.push({role:'user',content:msg});
    const sp=`${SYSTEM_PROMPTS[currentMode]}\n\n以下是文件內容：\n${currentPdfText}`;
    const resp=await callClaude(conversationHistory,sp);
    const info=PDF_FILES.find(f=>f.file===currentPdfFile);
    const pdfTag=info ? info.desc : (currentPdfFile&&currentPdfFile!=='多檔模式' ? currentPdfFile : null);
    hideTyping(); addMessage(resp,'assistant',pdfTag);
    conversationHistory.push({role:'assistant',content:resp});
}

// ─── SEND ─────────────────────────────────────────────────────
async function sendMessage() {
    const inp=document.getElementById('inputField');
    const msg=inp.value.trim(); if (!msg) return;
    inp.value=''; inp.style.height='auto';
    addMessage(msg,'user'); setInput(false); showTyping();
    try {
        if      (currentState==='idle')                   await handleIdle(msg);
        else if (currentState==='waiting_file_selection') await handleFileSelect(msg);
        else if (currentState==='waiting_confirmation')   await handleConfirm(msg);
        else if (currentState==='conversation')           await handleConversation(msg);
    } catch(err) { hideTyping(); addMessage(`發生錯誤：${err.message}`,'assistant'); }
    setInput(true); document.getElementById('inputField').focus();
}

// ─── RESET ────────────────────────────────────────────────────
function resetConversation() {
    currentState='idle'; conversationHistory=[]; currentPdfFile=null; currentPdfText=''; pendingPdfFile=null; originalQuestion='';
    isFirstAssistantMsg=true; lastReactionRowId=null;
    hideFileBar(); renderWelcome();
}

// ─── DROPDOWN ─────────────────────────────────────────────────
function buildSidebar() {
    const sidebar = document.getElementById('chatSidebar');
    sidebar.innerHTML = `<div class="sidebar-label">服務類型</div>` +
        Object.entries(MODES).map(([key, m]) => {
            const active = key === currentMode;
            const style = active ? `style="--sb-color:${m.color};--sb-bg:${m.color}12;--sb-icon-bg:${m.color}22"` : '';
            return `<button class="sidebar-item${active?' active':''}" onclick="selectMode('${key}')" ${style}>
                <div class="sidebar-item-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="${active ? m.color : 'currentColor'}" stroke-width="1.8">${MODE_ICONS[key]}</svg>
                </div>
                ${m.label}
            </button>`;
        }).join('');
}
function selectMode(key) {
    if (key === currentMode) return;
    if (conversationHistory.length > 0 || currentPdfFile) {
        pendingModeSwitch = key;
        document.getElementById('switchModal').classList.add('on');
    } else {
        applyModeSwitch(key);
    }
}

// ─── FEEDBACK ─────────────────────────────────────────────────
let feedbackContext = { reactionId: null, vote: null };

function handleReaction(reactionId, vote) {
  feedbackContext = { reactionId, vote };
  const isUp = vote === 'up';
  document.getElementById('fbIco').innerHTML = isUp
    ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#10B981" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"/></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#EF4444" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018c.163 0 .326.02.485.06L17 4m-7 10v2a2 2 0 002 2h.095c.5 0 .905-.405.905-.905 0-.714.211-1.412.608-2.006L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5"/></svg>`;
  document.getElementById('fbIco').style.background = isUp ? '#ECFDF5' : '#FEF2F2';
  document.getElementById('fbTitle').textContent = isUp ? '很高興能幫上忙！' : '感謝您的回饋';
  document.getElementById('fbDesc').textContent = isUp ? '如有其他想法，歡迎告訴我們' : '請告訴我們哪裡可以改善';
  document.getElementById('fbSubmit').style.background = isUp ? 'linear-gradient(135deg,#10B981,#059669)' : '';
  document.getElementById('fbText').value = '';
  document.getElementById('feedbackModal').classList.add('on');
}
function closeFeedback() {
  document.getElementById('feedbackModal').classList.remove('on');
  feedbackContext = { reactionId: null, vote: null };
}
function submitFeedback() {
  const { reactionId, vote } = feedbackContext;
  if (reactionId) {
    const row = document.getElementById(reactionId);
    if (row) {
      row.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('voted-up','voted-down'));
      const btn = row.querySelector(vote==='up' ? ':first-child' : ':last-child');
      if (btn) btn.classList.add(vote==='up' ? 'voted-up' : 'voted-down');
    }
  }
  closeFeedback();
}

// ─── EVENTS ───────────────────────────────────────────────────
function handleKeyDown(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
document.getElementById('inputField').addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });
renderWelcome();
buildSidebar();
</script>
</body>
